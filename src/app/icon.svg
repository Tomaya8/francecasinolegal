<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d078"/>
      <stop offset="50%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#b08a2e"/>
    </linearGradient>
  </defs>
  <!-- Outer circle (chip edge) -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#gold)" stroke-width="12"/>
  <!-- Chip notches -->
  <rect x="244" y="2" width="24" height="40" rx="6" fill="url(#gold)"/>
  <rect x="244" y="470" width="24" height="40" rx="6" fill="url(#gold)"/>
  <rect x="2" y="244" width="40" height="24" rx="6" fill="url(#gold)"/>
  <rect x="470" y="244" width="40" height="24" rx="6" fill="url(#gold)"/>
  <rect x="75" y="60" width="24" height="40" rx="6" fill="url(#gold)" transform="rotate(45 87 80)"/>
  <rect x="413" y="412" width="24" height="40" rx="6" fill="url(#gold)" transform="rotate(45 425 432)"/>
  <rect x="60" y="413" width="40" height="24" rx="6" fill="url(#gold)" transform="rotate(45 80 425)"/>
  <rect x="412" y="60" width="40" height="24" rx="6" fill="url(#gold)" transform="rotate(45 432 72)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <!-- FCL text -->
  <text x="256" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="url(#gold)" letter-spacing="-4">FCL</text>
  <!-- Small accent line below -->
  <rect x="156" y="310" width="200" height="3" rx="1.5" fill="url(#gold)" opacity="0.5"/>
</svg>
